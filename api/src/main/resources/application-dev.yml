# Database configuration
spring:
  datasource:
    url: jdbc:mysql://${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update # dev only: auto-evolve schema
    open-in-view: false     # close session at controller boundary
    show-sql: true
    properties:
      hibernate.format_sql: true