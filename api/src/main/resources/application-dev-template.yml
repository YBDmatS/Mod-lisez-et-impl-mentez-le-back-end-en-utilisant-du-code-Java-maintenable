# Database configuration
spring:
  datasource:
    url: jdbc:mysql://your_ip:your_port/your_database_name
    username: your_username
    password: your_password

  jpa:
    hibernate:
      ddl-auto: update # dev only: auto-evolve schema
    open-in-view: false     # close session at controller boundary
    show-sql: true
    properties:
      hibernate.format_sql: true