#H2 database configuration for testing purposes
spring:
  datasource:
    url: jdbc:h2:mem:chatop_test
    driver-class-name: org.h2.Driver
    username: chatop_test_user
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: never

# Security configuration
security:
  jwt:
    secret: test-secret-key-for-security-tests

# Tomcat configuration to allow large file uploads (if needed)
server:
  tomcat:
    max-swallow-size: -1